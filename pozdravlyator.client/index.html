<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Поздравлятор</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="app">
        <!-- Боковая панель -->
        <aside id="sidebar">
            <div class="logo">
                ПОЗДРАВЛЯТОР
            </div>
            <nav>
                <a href="#" onclick="navigateTo('home')" class="active">
                    Главная
                </a>
                <a href="#" onclick="navigateTo('list')">
                    Все записи
                </a>
                <a href="#" onclick="navigateTo('add')">
                    Добавить
                </a>
            </nav>
            <div class="sidebar-footer"></div>
        </aside>

        <!-- Основной контент -->
        <main id="main">
            <header>
                <div class="header-info">
                    <h2 id="page-title">Главная</h2>
                    <span id="page-count"></span>
                </div>
            </header>
            <section id="content">
                <!-- сюда загружается контент -->
            </section>
        </main>
    </div>

    <!-- Модальное окно -->
    <div id="photoModal" class="modal" style="display:none">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">✕</span>
            <img id="modalImage" src="" alt="Фото" />
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
